version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./outputs:/app/outputs
      - ./lora_train:/app/lora_train
      - ./backend/workflows:/app/workflows
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:///./auto_draw.db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
